<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>Hockey</title>
    <style>
      :root {
        --safe-bottom: env(safe-area-inset-bottom, 0px);
        --safe-left: env(safe-area-inset-left, 0px);
        --safe-right: env(safe-area-inset-right, 0px);
        --pad: clamp(8px, 2.5vw, 18px);
        --dpad: clamp(104px, 30vw, 140px);
        --btn: calc(var(--dpad) * 0.36);
        --gap: calc(var(--dpad) * 0.32);
      }
      html, body {
        margin: 0;
        width: 100vw;
        height: 100dvh;
        overflow: hidden;
        background: #1a1a2e;
        font-family: system-ui, sans-serif;
      }
      body {
        display: flex;
        justify-content: center;
        align-items: center;
        user-select: none;
        -webkit-user-select: none;
      }
      #app {
        display: flex;
        justify-content: center;
        align-items: center;
        width: 100vw;
        height: calc(100dvh - var(--controls-reserve, 0px));
        padding: var(--pad);
        box-sizing: border-box;
      }
      canvas {
        display: block;
        border-radius: 8px;
        touch-action: none;
      }
      .mobile-controls { display: none; }
      @media (hover: none), (pointer: coarse) {
        body { touch-action: none; }
        #app { align-items: flex-start; padding-top: max(8px, env(safe-area-inset-top, 0px)); }
        .mobile-controls {
          position: fixed;
          inset: 0;
          display: block;
          pointer-events: none;
        }
        .mobile-player {
          position: absolute;
          bottom: max(var(--pad), var(--safe-bottom));
          width: var(--dpad);
          pointer-events: auto;
        }
        .mobile-player-1 { left: max(var(--pad), var(--safe-left)); }
        .mobile-player-2 { right: max(var(--pad), var(--safe-right)); }
        .mobile-name {
          margin-bottom: 4px;
          text-align: center;
          font: 700 clamp(11px, 3.2vw, 14px) system-ui, sans-serif;
          text-shadow: 0 1px 3px black;
        }
        .mobile-dpad {
          position: relative;
          width: var(--dpad);
          height: var(--dpad);
        }
        .mobile-btn {
          position: absolute;
          width: var(--btn);
          height: var(--btn);
          border: 2px solid rgba(255, 255, 255, 0.65);
          border-radius: clamp(10px, 3vw, 14px);
          background: rgba(255, 255, 255, 0.22);
          color: white;
          font: 700 clamp(17px, 5vw, 22px) system-ui, sans-serif;
          touch-action: none;
          user-select: none;
          -webkit-user-select: none;
        }
        .mobile-btn:active { background: rgba(255, 255, 255, 0.42); }
        .mobile-up { left: var(--gap); top: 0; }
        .mobile-left { left: 0; top: var(--gap); }
        .mobile-right { right: 0; top: var(--gap); }
        .mobile-down { left: var(--gap); bottom: 0; }
        .mobile-start {
          left: 50%;
          bottom: calc(max(var(--pad), var(--safe-bottom)) + var(--btn) * 0.25);
          transform: translateX(-50%);
          width: clamp(84px, 24vw, 112px);
          height: var(--btn);
          font-size: clamp(13px, 3.6vw, 16px);
          pointer-events: auto;
        }
      }
      @media (hover: none) and (orientation: landscape), (pointer: coarse) and (orientation: landscape) {
        #app { height: 100dvh; align-items: center; }
        .mobile-controls { opacity: 0.68; }
        .mobile-player { bottom: max(6px, var(--safe-bottom)); }
      }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <script src="../vendor/p5.min.js"></script>
    <script type="module" src="./src/main.js"></script>
  </body>
</html>
