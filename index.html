<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MakerAppLab — Demos p5.js</title>
    <style>
      :root {
        color-scheme: dark;
        font-family: system-ui, sans-serif;
        background: #151528;
        color: #f5f5ff;
      }
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 32px;
      }
      main {
        width: min(720px, 100%);
      }
      h1 {
        margin: 0 0 8px;
        font-size: clamp(2rem, 5vw, 3.5rem);
      }
      p {
        margin: 0 0 28px;
        color: #c9c9df;
      }
      nav {
        display: grid;
        gap: 16px;
      }
      a {
        display: block;
        padding: 20px;
        border: 1px solid rgba(255, 255, 255, 0.14);
        border-radius: 16px;
        background: rgba(255, 255, 255, 0.07);
        color: inherit;
        text-decoration: none;
      }
      a:hover,
      a:focus-visible {
        border-color: #8fd3ff;
        background: rgba(143, 211, 255, 0.14);
      }
      strong {
        display: block;
        margin-bottom: 4px;
        font-size: 1.15rem;
      }
      span {
        color: #c9c9df;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>MakerAppLab</h1>
      <p>Demos de juegos en p5.js para abrir con Live Server desde la raíz del repositorio.</p>
      <nav aria-label="Demos">
        <a href="./01-recolectar-esquivar/">
          <strong>01 — Recolectar y esquivar</strong>
          <span>Recoge gemas y evita enemigos.</span>
        </a>
        <a href="./02-disparar-esquivar/">
          <strong>02 — Disparar y esquivar</strong>
          <span>Mueve la nave, dispara y esquiva choques.</span>
        </a>
        <a href="./03-duelo/">
          <strong>03 — Duelo</strong>
          <span>Juego local para dos jugadores.</span>
        </a>
      </nav>
    </main>
  </body>
</html>
