<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>Disparar y esquivar</title>
    <style>
      :root {
        --safe-bottom: env(safe-area-inset-bottom, 0px);
        --safe-left: env(safe-area-inset-left, 0px);
        --safe-right: env(safe-area-inset-right, 0px);
        --pad: clamp(10px, 3vw, 24px);
        --dpad: clamp(116px, 33vw, 150px);
        --btn: calc(var(--dpad) * 0.36);
        --gap: calc(var(--dpad) * 0.32);
        --fire: clamp(64px, 18vw, 78px);
      }
      html, body {
        margin: 0;
        width: 100vw;
        height: 100dvh;
        overflow: hidden;
        background: #1a1a2e;
        font-family: system-ui, sans-serif;
      }
      body {
        display: flex;
        justify-content: center;
        align-items: center;
        user-select: none;
        -webkit-user-select: none;
      }
      #app {
        display: flex;
        justify-content: center;
        align-items: center;
        width: 100vw;
        height: calc(100dvh - var(--controls-reserve, 0px));
        padding: var(--pad);
        box-sizing: border-box;
      }
      canvas {
        display: block;
        border-radius: 8px;
        touch-action: none;
      }
      .mobile-controls { display: none; }
      @media (hover: none), (pointer: coarse) {
        body { touch-action: none; }
        #app { align-items: flex-start; padding-top: max(10px, env(safe-area-inset-top, 0px)); }
        .mobile-controls {
          position: fixed;
          inset: 0;
          display: block;
          pointer-events: none;
        }
        .mobile-dpad {
          position: absolute;
          left: max(var(--pad), var(--safe-left));
          bottom: max(var(--pad), var(--safe-bottom));
          width: var(--dpad);
          height: var(--dpad);
          pointer-events: auto;
        }
        .mobile-btn {
          position: absolute;
          width: var(--btn);
          height: var(--btn);
          border: 2px solid rgba(255, 255, 255, 0.65);
          border-radius: clamp(10px, 3vw, 14px);
          background: rgba(255, 255, 255, 0.22);
          color: white;
          font: 700 clamp(18px, 5vw, 22px) system-ui, sans-serif;
          touch-action: none;
          user-select: none;
          -webkit-user-select: none;
        }
        .mobile-btn:active { background: rgba(255, 255, 255, 0.42); }
        .mobile-up { left: var(--gap); top: 0; }
        .mobile-left { left: 0; top: var(--gap); }
        .mobile-right { right: 0; top: var(--gap); }
        .mobile-down { left: var(--gap); bottom: 0; }
        .mobile-fire {
          right: max(var(--pad), var(--safe-right));
          bottom: max(var(--pad), var(--safe-bottom));
          width: var(--fire);
          height: var(--fire);
          border-radius: 50%;
          font-size: clamp(22px, 6vw, 26px);
          pointer-events: auto;
        }
        .mobile-start {
          right: max(var(--pad), var(--safe-right));
          bottom: calc(max(var(--pad), var(--safe-bottom)) + var(--fire) + 14px);
          width: clamp(92px, 28vw, 112px);
          height: var(--btn);
          font-size: clamp(14px, 4vw, 16px);
          pointer-events: auto;
        }
      }
      @media (hover: none) and (orientation: landscape), (pointer: coarse) and (orientation: landscape) {
        #app { height: 100dvh; align-items: center; }
        .mobile-controls { opacity: 0.72; }
      }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <script src="../vendor/p5.min.js"></script>
    <script type="module" src="./src/main.js"></script>
  </body>
</html>
